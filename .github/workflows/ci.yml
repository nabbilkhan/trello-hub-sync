name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile (stdlib only — no install deps)
        run: python -m py_compile trellohub/*.py
      - name: Install
        run: python -m pip install .
      - name: CLI smoke test
        run: |
          trello-sync --version
          trello-sync --help
          python -c "import trellohub, trellohub.engine, trellohub.webhook, trellohub.comments"
